<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW Simple Achievement App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">
<style>
  :root {
    --bg-deep:    #0d0602;
    --bg:         #1a0d04;
    --panel:      #2a1a0e;
    --panel-2:    #3a2618;
    --border:     #6e4f2a;
    --gold:       #f0c419;
    --gold-bright:#ffd700;
    --gold-deep:  #8a6a2f;
    --text:       #e9d8a6;
    --muted:      #a89070;
    --accent:        var(--gold);
    --accent-hover:  var(--gold-bright);
    --success:    #6dd370;
    --error:      #d96444;
    --link:          var(--gold-bright);
    --serif-display: 'Cinzel', 'Trajan Pro', Georgia, serif;
    --serif-body:    'Cormorant Garamond', Garamond, Georgia, serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    background:
      radial-gradient(ellipse at top, #2a1810 0%, var(--bg) 45%, var(--bg-deep) 100%) fixed,
      var(--bg);
    color: var(--text);
    font-family: var(--serif-body);
    font-size: 17px;
    line-height: 1.5;
    min-height: 100vh;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 {
    margin: 0 0 4px 0;
    font-family: var(--serif-display);
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-shadow:
      0 0 24px rgba(240, 196, 25, 0.35),
      0 2px 4px rgba(0, 0, 0, 0.8);
  }
  .subtitle {
    color: var(--muted);
    margin-bottom: 24px;
    font-size: 0.95rem;
    font-style: italic;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .cache-badge {
    font-size: 0.75rem;
    padding: 2px 10px;
    border-radius: 10px;
    background: var(--panel);
    border: 1px solid var(--gold-deep);
    font-family: var(--serif-body);
    font-style: italic;
    letter-spacing: 0.04em;
  }
  .cache-badge.hit  { color: var(--success); border-color: var(--success); }
  .cache-badge.miss { color: var(--gold);    border-color: var(--gold); }

  .form-card {
    background: linear-gradient(180deg, var(--panel) 0%, #1f1409 100%);
    border: 2px solid var(--gold-deep);
    border-radius: 3px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow:
      inset 0 0 0 1px rgba(0, 0, 0, 0.5),
      inset 0 0 30px rgba(0, 0, 0, 0.4),
      0 4px 20px rgba(0, 0, 0, 0.6);
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (min-width: 600px) { .form-row-3 { grid-template-columns: 1fr 1fr 1fr; } }
  label {
    display: block;
    font-family: var(--serif-display);
    font-size: 0.7rem;
    color: var(--muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  input, select {
    width: 100%;
    padding: 8px 10px;
    background: rgba(13, 6, 2, 0.7);
    border: 1px solid var(--gold-deep);
    border-radius: 2px;
    color: var(--text);
    font-size: 1rem;
    font-family: var(--serif-body);
    box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--gold);
  }
  button {
    width: 100%;
    padding: 10px 16px;
    background: linear-gradient(180deg, #f0c419 0%, #c89316 50%, #a87913 100%);
    color: #1a0d04;
    border: 1px solid #8a6a2f;
    border-radius: 2px;
    font-size: 0.95rem;
    font-family: var(--serif-display);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    margin-top: 12px;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.3),
      inset 0 -1px 0 rgba(0, 0, 0, 0.4),
      0 2px 6px rgba(0, 0, 0, 0.5);
    transition: filter 0.15s;
  }
  button:hover:not(:disabled) { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    padding: 12px 16px;
    border-radius: 2px;
    margin: 12px 0;
    font-size: 0.95rem;
    font-family: var(--serif-body);
    font-style: italic;
  }
  .status.error   { background: rgba(217, 100, 68, 0.12); border: 1px solid var(--error);     color: #fca5a5; }
  .status.loading { background: rgba(240, 196, 25, 0.08); border: 1px solid var(--gold-deep); color: var(--text); }
  .status.empty   { background: var(--panel);             border: 1px dashed var(--gold-deep); color: var(--muted); text-align: center; padding: 32px; }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  @media (min-width: 600px) { .stats { grid-template-columns: repeat(4, 1fr); } }
  .stat-card {
    background: linear-gradient(180deg, var(--panel) 0%, #1f1409 100%);
    border: 1.5px solid var(--gold-deep);
    border-radius: 2px;
    padding: 16px 12px;
    text-align: center;
    box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.4);
  }
  .stat-value {
    font-family: var(--serif-display);
    font-size: 2rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1.1;
    text-shadow: 0 0 12px rgba(240, 196, 25, 0.4);
  }
  .stat-label {
    font-family: var(--serif-display);
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .section-title {
    font-family: var(--serif-display);
    font-size: 1.05rem;
    color: var(--gold);
    margin: 0 0 10px 0;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--gold-deep);
    padding-bottom: 6px;
  }
  .cat-section { margin-bottom: 20px; }
  summary.section-title { cursor: pointer; user-select: none; list-style: none; padding: 4px 0 6px 0; }
  summary.section-title::-webkit-details-marker { display: none; }
  summary.section-title::before {
    content: '▼';
    display: inline-block;
    margin-right: 8px;
    font-size: 0.7em;
    transition: transform 0.15s;
  }
  .cat-section:not([open]) > summary.section-title::before { transform: rotate(-90deg); }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 8px;
  }
  .cat-card {
    background: linear-gradient(180deg, var(--panel) 0%, #1f1409 100%);
    border: 1px solid var(--gold-deep);
    border-radius: 2px;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .cat-card:hover {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(240, 196, 25, 0.18);
  }
  .cat-card.active {
    border-color: var(--gold);
    background: linear-gradient(180deg, #3a2618 0%, #2a1a0e 100%);
    box-shadow: inset 0 0 12px rgba(240, 196, 25, 0.18);
  }
  .cat-card.loading { opacity: 0.6; cursor: progress; }
  .cat-name {
    font-family: var(--serif-display);
    font-size: 0.85rem;
    color: var(--text);
    margin-bottom: 4px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .cat-stats { font-size: 0.85rem; color: var(--muted); font-style: italic; }
  .cat-stats strong { color: var(--gold); font-weight: 600; font-style: normal; }

  .filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .filters input[type="search"] { flex: 1; min-width: 200px; }
  .filter-btn {
    padding: 6px 12px;
    background: var(--panel);
    border: 1px solid var(--gold-deep);
    border-radius: 2px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.78rem;
    font-family: var(--serif-display);
    width: auto;
    margin-top: 0;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    box-shadow: none;
  }
  .filter-btn:hover { border-color: var(--gold); filter: none; }
  .filter-btn.active {
    background: linear-gradient(180deg, #f0c419 0%, #c89316 100%);
    color: #1a0d04;
    border-color: var(--gold-deep);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }

  .ach-list { display: flex; flex-direction: column; gap: 4px; }
  .ach-item {
    background: linear-gradient(180deg, var(--panel) 0%, #1f1409 100%);
    border: 1px solid var(--gold-deep);
    border-left: 4px solid var(--gold-deep);
    border-radius: 2px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .ach-item:hover {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(240, 196, 25, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }
  .ach-item.completed {
    border-left-color: var(--gold);
    background: linear-gradient(180deg, #382715 0%, #221408 100%);
  }
  .ach-item.incomplete {
    border-left-color: #4a3820;
    opacity: 0.7;
  }
  .ach-name {
    font-family: var(--serif-display);
    font-weight: 500;
    color: var(--gold);
    text-decoration: none;
    font-size: 1rem;
    letter-spacing: 0.02em;
  }
  .ach-name:hover { color: var(--gold-bright); }
  .ach-id {
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: 8px;
    font-family: var(--serif-body);
    font-style: italic;
  }
  .ach-date {
    font-size: 0.85rem;
    color: var(--muted);
    white-space: nowrap;
    font-style: italic;
  }

  .favorites { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .fav-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(180deg, var(--panel) 0%, #1f1409 100%);
    border: 1px solid var(--gold-deep);
    border-radius: 16px;
    padding: 4px 6px 4px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .fav-chip:hover {
    border-color: var(--gold);
    box-shadow: 0 0 10px rgba(240, 196, 25, 0.2);
  }
  .fav-chip-name {
    color: var(--gold);
    font-weight: 600;
    font-family: var(--serif-display);
    letter-spacing: 0.03em;
  }
  .fav-chip-meta { color: var(--muted); font-size: 0.85rem; font-style: italic; }
  .fav-chip-remove {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 50%;
    width: auto;
    margin: 0;
    font-size: 1rem;
    line-height: 1;
    font-weight: normal;
    box-shadow: none;
    text-transform: none;
    letter-spacing: 0;
  }
  .fav-chip-remove:hover { color: var(--error); background: rgba(217, 100, 68, 0.15); filter: none; }

  .fav-toggle {
    background: var(--panel);
    border: 1px solid var(--gold-deep);
    color: var(--text);
    padding: 4px 12px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 0.72rem;
    font-family: var(--serif-display);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    width: auto;
    margin: 0;
    font-weight: 500;
    box-shadow: none;
  }
  .fav-toggle:hover { border-color: var(--gold); filter: none; }
  .fav-toggle.is-fav { color: var(--gold); border-color: var(--gold); }

  /* ================================================== */
  /* In-game-style achievement window layout            */
  /* ================================================== */
  :root {
    --parchment:      #e8d5a0;
    --parchment-2:    #dcc78b;
    --parchment-3:    #c9b075;
    --parchment-edge: #8a6a2f;
    --parchment-text: #3a2014;
    --parchment-muted:#6f4f29;
    --banner-bg:      #1c4a2c;
    --banner-bg-2:    #143a22;
    --banner-text:    #f0d59a;
    --bar-track:      #5a4a2a;
    --bar-fill:       #4a8a3a;
    --bar-fill-2:     #6dba48;
  }

  .window {
    background: linear-gradient(180deg, #2a1810 0%, #1a0f06 100%);
    border: 3px solid var(--gold-deep);
    border-radius: 4px;
    padding: 12px;
    box-shadow:
      inset 0 0 0 1px rgba(0, 0, 0, 0.5),
      0 6px 28px rgba(0, 0, 0, 0.7);
  }

  .window-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 16px 14px 16px;
    border-bottom: 1px solid var(--gold-deep);
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .points-block {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
  }
  .points-label {
    font-family: var(--serif-display);
    font-size: 0.78rem;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .points-value {
    font-family: var(--serif-display);
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 18px rgba(240, 196, 25, 0.45), 0 2px 4px rgba(0,0,0,0.7);
  }
  .points-value::after {
    content: ' \2756';
    font-size: 0.6em;
    margin-left: 6px;
    color: var(--gold);
    opacity: 0.8;
  }
  .window-header input[type="search"] {
    width: 240px;
    max-width: 100%;
    padding: 6px 10px;
    background: rgba(232, 213, 160, 0.95);
    border: 1px solid var(--parchment-edge);
    border-radius: 2px;
    color: var(--parchment-text);
    font-family: var(--serif-body);
    font-size: 0.95rem;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  .window-header input[type="search"]::placeholder {
    color: var(--parchment-muted);
    font-style: italic;
  }
  .window-header input[type="search"]:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3), 0 0 0 1px var(--gold);
  }

  .window-body {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 12px;
    align-items: start;
  }
  @media (max-width: 720px) {
    .window-body { grid-template-columns: 1fr; }
  }

  .sidebar {
    background: linear-gradient(180deg, var(--parchment-2) 0%, var(--parchment-3) 100%);
    border: 1px solid var(--parchment-edge);
    border-radius: 2px;
    padding: 6px;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15), inset 0 0 12px rgba(0,0,0,0.1);
    color: var(--parchment-text);
    font-family: var(--serif-body);
  }
  .sidebar-item {
    display: block;
    padding: 6px 10px;
    border-radius: 2px;
    cursor: pointer;
    color: var(--parchment-text);
    font-size: 0.95rem;
    line-height: 1.3;
    transition: background 0.12s, color 0.12s;
    list-style: none;
    user-select: none;
  }
  .sidebar-item::-webkit-details-marker { display: none; }
  .sidebar-item:hover {
    background: rgba(255, 255, 255, 0.35);
  }
  .sidebar-item.active {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment-2) 100%);
    box-shadow: inset 0 0 0 1px rgba(138, 106, 47, 0.5);
    font-weight: 600;
    color: #4a2810;
  }
  .sidebar-group { margin: 0; }
  .sidebar-group > summary { position: relative; padding-right: 22px; }
  .sidebar-group > summary::after {
    content: '▸';
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--parchment-muted);
    transition: transform 0.15s;
  }
  .sidebar-group[open] > summary::after { transform: translateY(-50%) rotate(90deg); }
  .sidebar-subs {
    margin: 2px 0 4px 12px;
    padding-left: 6px;
    border-left: 1px solid var(--parchment-edge);
  }
  .sidebar-subitem {
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 2px;
    font-size: 0.88rem;
    color: var(--parchment-muted);
    transition: background 0.12s, color 0.12s;
  }
  .sidebar-subitem:hover { background: rgba(255, 255, 255, 0.3); color: var(--parchment-text); }
  .sidebar-subitem.active {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment-2) 100%);
    color: #4a2810;
    font-weight: 600;
  }

  .content {
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment-2) 100%);
    border: 1px solid var(--parchment-edge);
    border-radius: 2px;
    padding: 12px;
    color: var(--parchment-text);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12), inset 0 0 16px rgba(0,0,0,0.08);
    min-height: 320px;
  }

  .banner {
    background: linear-gradient(180deg, var(--banner-bg) 0%, var(--banner-bg-2) 100%);
    color: var(--banner-text);
    font-family: var(--serif-display);
    font-size: 0.95rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: center;
    padding: 8px 14px;
    border: 1px solid var(--parchment-edge);
    border-radius: 2px;
    margin: 8px 0 10px 0;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.1),
      0 1px 0 rgba(0,0,0,0.2);
  }

  /* Recent achievements (summary view) */
  .recent-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
  .recent-item {
    display: grid;
    grid-template-columns: 44px 1fr auto auto;
    align-items: center;
    gap: 10px;
    background: linear-gradient(180deg, var(--parchment) 0%, var(--parchment-2) 100%);
    border: 1px solid var(--parchment-edge);
    border-radius: 2px;
    padding: 6px 10px;
  }
  .recent-item:nth-child(even) {
    background: linear-gradient(180deg, var(--parchment-2) 0%, var(--parchment-3) 100%);
  }
  .recent-icon, .ach-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #6e4f2a 0%, #3a2818 100%);
    border: 1px solid var(--parchment-edge);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 1.2rem;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.4);
  }
  .recent-name {
    font-family: var(--serif-display);
    font-weight: 700;
    color: #5a3010;
    text-decoration: none;
    font-size: 1rem;
    letter-spacing: 0.02em;
  }
  .recent-name:hover { color: #1a0d04; }
  .recent-date {
    color: var(--gold);
    font-size: 0.85rem;
    font-style: italic;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
    background: linear-gradient(180deg, #3a2818 0%, #1f1409 100%);
    padding: 2px 8px;
    border-radius: 2px;
    border: 1px solid var(--gold-deep);
  }
  .recent-points {
    background: linear-gradient(180deg, #3a2818 0%, #1f1409 100%);
    color: var(--gold);
    font-family: var(--serif-display);
    font-weight: 700;
    padding: 4px 10px;
    border: 1px solid var(--gold-deep);
    border-radius: 2px;
    min-width: 36px;
    text-align: center;
  }

  /* Progress overview (summary view) — rows are progress bars */
  .progress-total,
  .progress-item {
    position: relative;
    overflow: hidden;
    display: grid;
    align-items: center;
    background: linear-gradient(180deg, #1c4a2c 0%, #143a22 100%);
    border: 1px solid var(--parchment-edge);
    border-radius: 2px;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.08),
      inset 0 -1px 0 rgba(0, 0, 0, 0.35);
  }
  .progress-fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: var(--pct, 0%);
    background: linear-gradient(180deg, #7fcf52 0%, #4a8a3a 100%);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.25),
      inset 0 -1px 0 rgba(0, 0, 0, 0.25);
    z-index: 0;
    transition: width 0.4s ease;
  }
  .progress-total > *:not(.progress-fill),
  .progress-item > *:not(.progress-fill) { position: relative; z-index: 1; }

  .progress-total {
    grid-template-columns: 1fr auto;
    gap: 12px;
    padding: 8px 14px;
    margin-bottom: 8px;
  }
  .progress-total-label {
    font-family: var(--serif-display);
    color: #fff8d8;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 0.95rem;

  }
  .progress-total-value {

  .progress-grid {
    display: grid;

  @media (max-width: 600px) { .progress-grid { grid-template-columns: 1fr; } }

  /* Achievement list inside content panel (parchment-styled) */

  .content .ach-item {

    border-radius: 2px;

  .content .ach-item:nth-child(even) {

  }
  .content .ach-item:hover {
    border-color: #4a2810;

  .content .ach-item.completed { border-left-color: var(--bar-fill); }
  .content .ach-item.incomplete { border-left-color: var(--parchment-edge); opacity: 0.78; }
  .content .ach-item.incomplete:has(.ach-progress) { opacity: 1; }
  .content .ach-name {

  .ach-progress {

  .ach-progress-bar {

    top: 0; left: 0; bottom: 0;

    background: linear-gradient(180deg, #7fcf52 0%, #4a8a3a 100%);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
  }
  .ach-progress-text {
    font-size: 0.78rem;
    color: var(--parchment-muted);
    font-style: italic;
    white-space: nowrap;
  }
  .content .ach-name:hover { color: #1a0d04; }
  .content .ach-id {
    color: var(--parchment-muted);
    font-style: italic;
  }
  .content .ach-date {
    color: var(--gold);
    background: linear-gradient(180deg, #3a2818 0%, #1f1409 100%);
    padding: 2px 8px;
    border: 1px solid var(--gold-deep);
    border-radius: 2px;
    font-size: 0.8rem;
    font-style: italic;
  }
  .content .status.empty {
    background: rgba(58, 32, 20, 0.1);
    border: 1px dashed var(--parchment-edge);
    color: var(--parchment-muted);
  }
</style>
<script>window.whTooltips = { colorLinks: true, iconizeLinks: true, renameLinks: false };</script>
<script async src="https://www.wowhead.com/widgets/power.js"></script>
</head>
<body>
<div class="container">
  <h1>⚔️ WoW Simple Achievement App</h1>
  <div class="subtitle">
    <span>Vyhledávač achievementů postavy přes Battle.net API</span>
    <span style="display:flex; gap: 8px; align-items: center;">
      <button id="favToggle" class="fav-toggle" hidden></button>
      <span id="cacheBadge"></span>
    </span>
  </div>

  <div id="favorites" class="favorites" style="display:none;"></div>

  <div class="form-card">
    <div class="form-row">
      <div>
        <label for="character">Jméno postavy</label>
        <input type="text" id="character" placeholder="např. Thrall" autocomplete="off">
      </div>
      <div>
        <label for="realm">Realm / Server</label>
        <input type="text" id="realm" placeholder="např. Argent Dawn" autocomplete="off" list="realm-history">
        <datalist id="realm-history"></datalist>
      </div>
    </div>
    <div class="form-row-3">
      <div>
        <label for="region">Region</label>
        <select id="region">
          <option value="eu" selected>Evropa (EU)</option>
          <option value="us">Amerika (US)</option>
          <option value="kr">Korea (KR)</option>
          <option value="tw">Taiwan (TW)</option>
        </select>
      </div>
      <div>
        <label for="locale">Jazyk</label>
        <select id="locale">
          <option value="cs_CZ" selected>Čeština</option>
          <option value="en_GB">English (EU)</option>
          <option value="en_US">English (US)</option>
          <option value="de_DE">Deutsch</option>
          <option value="pl_PL">Polski</option>
          <option value="ru_RU">Русский</option>
        </select>
      </div>
    </div>
    <button id="searchBtn">Načíst achievementy</button>
  </div>

  <div id="status"></div>

  <div id="window-wrap" style="display:none;">
    <div class="window">
      <div class="window-header">
        <div class="points-block">
          <div class="points-label" id="pointsLabel">Achievement Points</div>
          <div class="points-value" id="pointsValue">0</div>
        </div>
        <input type="search" id="searchInput" placeholder="">
      </div>
      <div class="window-body">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content" id="content"></main>
      </div>
    </div>
  </div>

</div>

<script>
  const API_URL = 'api.php';

  let currentFilter = 'all';
  let searchTerm = '';
  let currentView = 'summary';      // 'summary' or category id (number)
  let categoryData = null;           // { region, locale, fetched_at, root_ids, categories }
  let categoryMapPromise = null;
  let lastResultsData = null;

  const $ = id => document.getElementById(id);
  const statusEl  = $('status');
  const searchBtn = $('searchBtn');
  const cacheBadge = $('cacheBadge');

  ['character', 'realm', 'region', 'locale'].forEach(id => {
    const saved = localStorage.getItem('wow_' + id);
    if (saved) $(id).value = saved;
    $(id).addEventListener('change', () => localStorage.setItem('wow_' + id, $(id).value));
  });

  // i18n — UI language follows the locale dropdown (cs_CZ → Czech, else English)
  const i18n = {
    cs: {
      subtitle: 'Vyhledávač achievementů postavy přes Battle.net API',
      labelCharacter: 'Jméno postavy',
      labelRealm: 'Realm / Server',
      labelRegion: 'Region',
      labelLocale: 'Jazyk',
      regionEU: 'Evropa (EU)', regionUS: 'Amerika (US)', regionKR: 'Korea (KR)', regionTW: 'Taiwan (TW)',
      placeholderCharacter: 'např. Thrall',
      placeholderRealm: 'např. Argent Dawn',
      submit: 'Načíst achievementy',
      submitLoading: 'Načítám...',
      favAdd: '☆ Přidat do oblíbených',
      favRemove: '★ Odebrat z oblíbených',
      favRemoveAria: 'Odebrat',
      cacheHit: 'cache: hit',
      cacheLive: 'cache: live',
      statusFillFields: 'Vyplň prosím jméno postavy i realm.',
      statusLoading: 'Načítám data z Battle.net API...',
      statusError: 'Chyba',
      statusConn: 'Chyba spojení: ',
      statusNotFound: (c, r) => `Postava "${c}" na realmu "${r}" nebyla nalezena. Zkontroluj jméno a server.`,
      pointsTitle: 'Achievement Points',
      summaryView: 'Souhrn',
      recentTitle: 'Nedávné achievementy',
      progressTitle: 'Přehled postupu',
      totalEarned: 'Achievementů získáno',
      searchResults: 'Hledání',
      categoryLoading: 'Načítám mapu kategorií (první načtení může trvat až minutu)...',
      categoryFail: 'Nepodařilo se načíst kategorie: ',
      searchPlaceholder: 'Hledat achievement...',
      filterAll: 'Vše',
      filterCompleted: '✓ Splněno',
      filterIncomplete: 'Rozpracováno',
      empty: 'Žádné výsledky odpovídající filtru.',
      dateLocale: 'cs-CZ',
      sortLocale: 'cs',
    },
    en: {
      subtitle: 'Look up character achievements via the Battle.net API',
      labelCharacter: 'Character name',
      labelRealm: 'Realm / Server',
      labelRegion: 'Region',
      labelLocale: 'Language',
      regionEU: 'Europe (EU)', regionUS: 'Americas (US)', regionKR: 'Korea (KR)', regionTW: 'Taiwan (TW)',
      placeholderCharacter: 'e.g. Thrall',
      placeholderRealm: 'e.g. Argent Dawn',
      submit: 'Load achievements',
      submitLoading: 'Loading...',
      favAdd: '☆ Add to favorites',
      favRemove: '★ Remove from favorites',
      favRemoveAria: 'Remove',
      cacheHit: 'cache: hit',
      cacheLive: 'cache: live',
      statusFillFields: 'Please enter both character name and realm.',
      statusLoading: 'Loading data from Battle.net API...',
      statusError: 'Error',
      statusConn: 'Connection error: ',
      statusNotFound: (c, r) => `Character "${c}" on realm "${r}" not found. Check the spelling.`,
      pointsTitle: 'Achievement Points',
      summaryView: 'Summary',
      recentTitle: 'Recent Achievements',
      progressTitle: 'Progress Overview',
      totalEarned: 'Achievements Earned',
      searchResults: 'Search',
      categoryLoading: 'Loading category map (first load may take up to a minute)...',
      categoryFail: 'Failed to load categories: ',
      searchPlaceholder: 'Search achievement...',
      filterAll: 'All',
      filterCompleted: '✓ Completed',
      filterIncomplete: 'In progress',
      empty: 'No results match this filter.',
      dateLocale: 'en-US',
      sortLocale: 'en',
    },
  };
  const uiLang = () => $('locale').value === 'cs_CZ' ? 'cs' : 'en';
  const t = () => i18n[uiLang()];

  function applyStaticI18n() {
    const _ = t();
    document.querySelector('.subtitle > span:first-child').textContent = _.subtitle;
    document.querySelector('label[for="character"]').textContent = _.labelCharacter;
    document.querySelector('label[for="realm"]').textContent = _.labelRealm;
    document.querySelector('label[for="region"]').textContent = _.labelRegion;
    document.querySelector('label[for="locale"]').textContent = _.labelLocale;
    document.querySelector('#region option[value="eu"]').textContent = _.regionEU;
    document.querySelector('#region option[value="us"]').textContent = _.regionUS;
    document.querySelector('#region option[value="kr"]').textContent = _.regionKR;
    document.querySelector('#region option[value="tw"]').textContent = _.regionTW;
    if (!searchBtn.disabled) searchBtn.textContent = _.submit;
    $('character').placeholder = _.placeholderCharacter;
    $('realm').placeholder = _.placeholderRealm;
    $('pointsLabel').textContent = _.pointsTitle;
    $('searchInput').placeholder = _.searchPlaceholder;
    document.documentElement.lang = uiLang();
    updateFavToggle();
    if (lastResultsData) {
      renderSidebar();
      renderContent();
    }
  }

  // Realm autocomplete from Battle.net realm index (cached per region+locale)
  const REALM_CACHE_PREFIX = 'wow_realms:';
  const REALM_CACHE_TTL = 7 * 86400 * 1000;
  const realmsByRegion = {};

  async function loadRealms(region, locale) {
    if (realmsByRegion[region]) return realmsByRegion[region];

    try {
      const raw = localStorage.getItem(REALM_CACHE_PREFIX + region);
      if (raw) {
        const cached = JSON.parse(raw);
        if (cached.locale === locale && cached.fetched_at > Date.now() - REALM_CACHE_TTL) {
          realmsByRegion[region] = cached.realms;
          return cached.realms;
        }
      }
    } catch {}

    try {
      const params = new URLSearchParams({ action: 'realms', region, locale });
      const res = await fetch(`${API_URL}?${params}`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const realms = Array.isArray(data.realms) ? data.realms : [];
      realmsByRegion[region] = realms;
      try {
        localStorage.setItem(REALM_CACHE_PREFIX + region, JSON.stringify({
          locale, fetched_at: Date.now(), realms,
        }));
      } catch {}
      return realms;
    } catch {
      return [];
    }
  }

  async function renderRealmDatalist() {
    const realms = await loadRealms($('region').value, $('locale').value);
    $('realm-history').innerHTML = realms
      .map(r => `<option value="${escapeHtml(r.name)}">`)
      .join('');
  }
  $('region').addEventListener('change', () => {
    renderRealmDatalist();
    currentView = 'summary';
    categoryData = null;
    if (lastResultsData) { renderSidebar(); renderContent(); }
  });
  $('locale').addEventListener('change', () => {
    renderRealmDatalist();
    applyStaticI18n();
  });
  renderRealmDatalist();

  // Favorites
  const FAV_KEY = 'wow_favorites';
  const sameFav = (a, b) =>
    a.character.toLowerCase() === b.character.toLowerCase() &&
    a.realm.toLowerCase() === b.realm.toLowerCase() &&
    a.region === b.region;

  function getFavorites() {
    try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); }
    catch { return []; }
  }
  function setFavorites(favs) { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); }
  function isFavorite(f) { return getFavorites().some(x => sameFav(x, f)); }
  function addFavorite(f) {
    const favs = getFavorites();
    if (!favs.some(x => sameFav(x, f))) {
      favs.unshift(f);
      setFavorites(favs);
    }
  }
  function removeFavorite(f) {
    setFavorites(getFavorites().filter(x => !sameFav(x, f)));
  }
  function currentFormFav() {
    return {
      character: $('character').value.trim(),
      realm: $('realm').value.trim(),
      region: $('region').value,
    };
  }

  function renderFavorites() {
    const favs = getFavorites();
    const wrap = $('favorites');
    if (favs.length === 0) {
      wrap.style.display = 'none';
      wrap.innerHTML = '';
      return;
    }
    wrap.style.display = 'flex';
    const aria = t().favRemoveAria;
    wrap.innerHTML = favs.map((f, i) => `
      <div class="fav-chip" data-idx="${i}">
        <span class="fav-chip-name">${escapeHtml(f.character)}</span>
        <span class="fav-chip-meta">· ${escapeHtml(f.realm)} (${f.region})</span>
        <button class="fav-chip-remove" data-idx="${i}" aria-label="${aria}">×</button>
      </div>
    `).join('');

    wrap.querySelectorAll('.fav-chip').forEach(chip => {
      chip.addEventListener('click', e => {
        if (e.target.classList.contains('fav-chip-remove')) return;
        const f = getFavorites()[parseInt(chip.dataset.idx, 10)];
        if (!f) return;
        const regionChanged = $('region').value !== f.region;
        $('character').value = f.character;
        $('realm').value = f.realm;
        $('region').value = f.region;
        localStorage.setItem('wow_character', f.character);
        localStorage.setItem('wow_realm', f.realm);
        localStorage.setItem('wow_region', f.region);
        if (regionChanged) {
          currentView = 'summary';
          categoryData = null;
          renderRealmDatalist();
        }
        loadAchievements();
      });
    });
    wrap.querySelectorAll('.fav-chip-remove').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const f = getFavorites()[parseInt(btn.dataset.idx, 10)];
        if (!f) return;
        removeFavorite(f);
        renderFavorites();
        updateFavToggle();
      });
    });
  }

  function updateFavToggle() {
    const f = currentFormFav();
    const btn = $('favToggle');
    if (!f.character || !f.realm) { btn.hidden = true; return; }
    btn.hidden = false;
    if (isFavorite(f)) {
      btn.classList.add('is-fav');
      btn.textContent = t().favRemove;
    } else {
      btn.classList.remove('is-fav');
      btn.textContent = t().favAdd;
    }
  }

  $('favToggle').addEventListener('click', () => {
    const f = currentFormFav();
    if (!f.character || !f.realm) return;
    if (isFavorite(f)) removeFavorite(f); else addFavorite(f);
    renderFavorites();
    updateFavToggle();
  });

  renderFavorites();
  applyStaticI18n();

  searchBtn.addEventListener('click', loadAchievements);
  $('character').addEventListener('keydown', e => { if (e.key === 'Enter') loadAchievements(); });
  $('realm').addEventListener('keydown', e => { if (e.key === 'Enter') loadAchievements(); });

  // Static event listeners on the always-present window header / sidebar / content
  $('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value.toLowerCase().trim();
    renderContent();
  });
  $('content').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (btn) {
      currentFilter = btn.dataset.filter;
      renderContent();
    }
  });
  $('sidebar').addEventListener('click', e => {
    const item = e.target.closest('.sidebar-item, .sidebar-subitem');
    if (!item) return;
    if (item.dataset.view === 'summary') {
      currentView = 'summary';
    } else if (item.dataset.catId) {
      currentView = parseInt(item.dataset.catId, 10);
      if (!categoryData) {
        showStatus(t().categoryLoading, 'loading');
        ensureCategoryMap()
          .then(() => { clearStatus(); renderSidebar(); renderContent(); })
          .catch(err => showStatus(t().categoryFail + err.message, 'error'));
      }
    }
    renderSidebar();
    renderContent();
  });

  async function loadAchievements() {
    const character = $('character').value.trim();
    const realm     = $('realm').value.trim();
    const region    = $('region').value;
    const locale    = $('locale').value;

    if (!character || !realm) {
      showStatus(t().statusFillFields, 'error');
      return;
    }

    localStorage.setItem('wow_character', character);
    localStorage.setItem('wow_realm', realm);

    searchBtn.disabled = true;
    searchBtn.textContent = t().submitLoading;
    showStatus(t().statusLoading, 'loading');
    cacheBadge.textContent = '';
    cacheBadge.className = 'cache-badge';

    try {
      const params = new URLSearchParams({ character, realm, region, locale });
      const res = await fetch(`${API_URL}?${params}`);
      const data = await res.json();

      const cacheStatus = res.headers.get('X-Cache');
      if (cacheStatus) {
        cacheBadge.textContent = cacheStatus === 'HIT' ? t().cacheHit : t().cacheLive;
        cacheBadge.className = 'cache-badge ' + cacheStatus.toLowerCase();
      }

      if (!res.ok) {
        const errMsg = data.error || `${t().statusError} ${res.status}`;
        let userMsg = errMsg;
        if (res.status === 404) {
          userMsg = t().statusNotFound(character, realm);
        }
        showStatus(userMsg, 'error');
        return;
      }

      lastResultsData = data;
      currentView = 'summary';
      currentFilter = 'all';
      searchTerm = '';
      $('searchInput').value = '';
      $('window-wrap').style.display = 'block';
      $('pointsValue').textContent = (data.total_points ?? 0).toLocaleString(t().dateLocale);

      // Background-fetch the full category tree; sidebar + progress refine when it lands.
      ensureCategoryMap().then(() => {
        renderSidebar();
        renderContent();
      }).catch(() => {});

      renderSidebar();
      renderContent();
      updateFavToggle();
      clearStatus();
    } catch (err) {
      showStatus(t().statusConn + err.message, 'error');
    } finally {
      searchBtn.disabled = false;
      searchBtn.textContent = t().submit;
    }
  }

  function renderSidebar() {
    const _ = t();
    const sidebar = $('sidebar');
    let html = `<div class="sidebar-item${currentView === 'summary' ? ' active' : ''}" data-view="summary">${escapeHtml(_.summaryView)}</div>`;

    if (categoryData && categoryData.root_ids && categoryData.root_ids.length) {
      for (const rootId of categoryData.root_ids) {
        const cat = categoryData.categories[String(rootId)];
        if (!cat) continue;
        const subs = (cat.subcategory_ids || [])
          .map(id => ({ id, ...(categoryData.categories[String(id)] || {}) }))
          .filter(s => s.name);
        const isActiveRoot = currentView === rootId;
        const isActiveSub = subs.some(s => currentView === s.id);

        if (subs.length === 0) {
          html += `<div class="sidebar-item${isActiveRoot ? ' active' : ''}" data-cat-id="${rootId}">${escapeHtml(cat.name)}</div>`;
        } else {
          html += `<details class="sidebar-group"${isActiveRoot || isActiveSub ? ' open' : ''}>`
                + `<summary class="sidebar-item${isActiveRoot ? ' active' : ''}" data-cat-id="${rootId}">${escapeHtml(cat.name)}</summary>`
                + `<div class="sidebar-subs">`
                + subs.map(sub => `<div class="sidebar-subitem${currentView === sub.id ? ' active' : ''}" data-cat-id="${sub.id}">${escapeHtml(sub.name)}</div>`).join('')
                + `</div></details>`;
        }
      }
    } else if (lastResultsData) {
      // Fallback while the full category tree is still loading
      const seen = new Set();
      for (const c of (lastResultsData.category_progress || [])) {
        const id = c.category?.id;
        const name = c.category?.name;
        if (!id || !name || seen.has(id)) continue;
        seen.add(id);
        html += `<div class="sidebar-item${currentView === id ? ' active' : ''}" data-cat-id="${id}">${escapeHtml(name)}</div>`;
      }
    }

    sidebar.innerHTML = html;
  }

  function renderContent() {
    const content = $('content');
    if (!lastResultsData) { content.innerHTML = ''; return; }

    if (currentView === 'summary' && !searchTerm) {
      content.innerHTML = renderSummaryView();
    } else {
      content.innerHTML = renderListView();
    }

    if (window.$WowheadPower) window.$WowheadPower.refreshLinks();
  }

  function renderSummaryView() {
    const _ = t();
    const data = lastResultsData;

    const recent = (data.achievements || [])
      .filter(a => a.completed_timestamp)
      .sort((a, b) => b.completed_timestamp - a.completed_timestamp)
      .slice(0, 4);

    const recentHtml = recent.map(a => {
      const id = a.id;
      const name = a.achievement?.name || `#${id}`;
      return `
        <div class="recent-item">
          <div class="recent-icon">⚔</div>
          <div class="recent-body">
            <a class="recent-name" href="https://www.wowhead.com/achievement=${id}" target="_blank" rel="noopener noreferrer">${escapeHtml(name)}</a>
          </div>
          <div class="recent-date">${formatDate(a.completed_timestamp)}</div>
        </div>
      `;
    }).join('');

    const completedIds = new Set(
      (data.achievements || [])
        .filter(a => a.completed_timestamp)
        .map(a => a.id)
    );

    // Build per-root rollups when the category map is loaded; otherwise fall
    // back to the flat list from the API so the summary still renders.
    let rows = [];
    let totalCompleted = data.total_quantity ?? 0;
    let totalPossible = null;

    if (categoryData?.root_ids?.length) {
      const allIds = new Set();
      rows = categoryData.root_ids.map(rootId => {
        const cat = categoryData.categories[String(rootId)];
        if (!cat) return null;
        const ids = collectAchievementIds(rootId);
        ids.forEach(x => allIds.add(x));
        let completed = 0;
        ids.forEach(x => { if (completedIds.has(x)) completed++; });
        return { name: cat.name, completed, possible: ids.size };
      }).filter(Boolean);
      totalCompleted = 0;
      allIds.forEach(x => { if (completedIds.has(x)) totalCompleted++; });
      totalPossible = allIds.size || null;
    } else {
      rows = (data.category_progress || [])
        .slice()
        .sort((a, b) => (b.quantity || 0) - (a.quantity || 0))
        .map(c => ({
          name: c.category?.name || '—',
          completed: c.quantity ?? 0,
          possible: null,
        }));
    }

    const fmt = n => Number(n).toLocaleString(_.dateLocale);
    const pct = (c, p) => (p && p > 0) ? Math.min(100, (c / p) * 100) : (c > 0 ? 100 : 0);

    const progressHtml = rows.map(r => {
      const value = r.possible != null ? `${fmt(r.completed)}/${fmt(r.possible)}` : fmt(r.completed);
      const fill = pct(r.completed, r.possible);
      return `
        <div class="progress-item">
          <div class="progress-fill" style="width: ${fill.toFixed(2)}%"></div>
          <span class="progress-item-name">${escapeHtml(r.name)}</span>
          <span class="progress-item-value">${value}</span>
        </div>
      `;
    }).join('');

    const totalValue = totalPossible != null ? `${fmt(totalCompleted)}/${fmt(totalPossible)}` : fmt(totalCompleted);
    const totalFill = pct(totalCompleted, totalPossible);

    const recentBlock = recent.length ? `
      <h3 class="banner">${escapeHtml(_.recentTitle)}</h3>
      <div class="recent-list">${recentHtml}</div>
    ` : '';

    return `
      ${recentBlock}
      <h3 class="banner">${escapeHtml(_.progressTitle)}</h3>
      <div class="progress-total">
        <div class="progress-fill" style="width: ${totalFill.toFixed(2)}%"></div>
        <span class="progress-total-label">${escapeHtml(_.totalEarned)}</span>
        <span class="progress-total-value">${totalValue}</span>
      </div>
      <div class="progress-grid">${progressHtml}</div>
    `;
  }

  function collectAchievementIds(rootId) {
    const ids = new Set();
    if (!categoryData) return ids;
    const visit = id => {
      const cat = categoryData.categories[String(id)];
      if (!cat) return;
      (cat.achievement_ids || []).forEach(x => ids.add(x));
      (cat.subcategory_ids || []).forEach(visit);
    };
    visit(rootId);
    return ids;
  }

  function criteriaProgress(a) {
    const c = a.criteria;
    if (!c || a.completed_timestamp) return null;
    const kids = Array.isArray(c.child_criteria) ? c.child_criteria : null;
    if (!kids || kids.length === 0) return null;
    const total = kids.length;
    const done = kids.reduce((n, k) => n + (k.is_completed ? 1 : 0), 0);
    return { done, total };
  }

  function renderListView() {
    const _ = t();
    const allAch = (lastResultsData.achievements || []).map(a => ({
      id: a.id,
      name: a.achievement?.name || `#${a.id}`,
      completedAt: a.completed_timestamp || null,
      progress: criteriaProgress(a),
    }));

    let items = allAch;
    let title = '';

    if (typeof currentView === 'number' && categoryData?.categories?.[String(currentView)]) {
      const cat = categoryData.categories[String(currentView)];
      title = cat.name;
      const allowed = new Set(cat.achievement_ids);
      items = items.filter(a => allowed.has(a.id));
    } else if (typeof currentView === 'number') {
      const c = lastResultsData.category_progress?.find(p => p.category?.id === currentView);
      title = c?.category?.name || '';
    } else if (currentView === 'summary' && searchTerm) {
      title = _.searchResults;
    }

    if (currentFilter === 'completed') items = items.filter(a => a.completedAt);
    else if (currentFilter === 'incomplete') items = items.filter(a => !a.completedAt);

    if (searchTerm) items = items.filter(a => a.name.toLowerCase().includes(searchTerm));

    const sortLocale = _.sortLocale;
    items.sort((a, b) => {
      if (a.completedAt && b.completedAt) return b.completedAt - a.completedAt;
      if (a.completedAt) return -1;
      if (b.completedAt) return 1;
      return a.name.localeCompare(b.name, sortLocale);
    });

    const filtersHtml = `
      <div class="filters">
        <button class="filter-btn${currentFilter === 'all' ? ' active' : ''}" data-filter="all">${_.filterAll}</button>
        <button class="filter-btn${currentFilter === 'completed' ? ' active' : ''}" data-filter="completed">${_.filterCompleted}</button>
        <button class="filter-btn${currentFilter === 'incomplete' ? ' active' : ''}" data-filter="incomplete">${_.filterIncomplete}</button>
      </div>
    `;
    const banner = title ? `<h3 class="banner">${escapeHtml(title)}</h3>` : '';

    if (items.length === 0) {
      return `${banner}${filtersHtml}<div class="status empty">${escapeHtml(_.empty)}</div>`;
    }

    const listHtml = items.map(a => {
      let progressHtml = '';
      if (a.progress) {
        const pct = (a.progress.done / a.progress.total) * 100;
        progressHtml = `
          <div class="ach-progress">
            <div class="ach-progress-bar"><div class="ach-progress-fill" style="width: ${pct.toFixed(2)}%"></div></div>
            <div class="ach-progress-text">${a.progress.done} / ${a.progress.total}</div>
          </div>
        `;
      }
      return `
        <div class="ach-item ${a.completedAt ? 'completed' : 'incomplete'}">
          <div class="ach-icon">⚔</div>
          <div>
            <a class="ach-name" href="https://www.wowhead.com/achievement=${a.id}" target="_blank" rel="noopener noreferrer">${escapeHtml(a.name)}</a>
            <span class="ach-id">#${a.id}</span>
            ${progressHtml}
          </div>
          <div class="ach-date">${a.completedAt ? formatDate(a.completedAt) : '—'}</div>
        </div>
      `;
    }).join('');

    return `${banner}${filtersHtml}<div class="ach-list">${listHtml}</div>`;
  }

  async function ensureCategoryMap() {
    const region = $('region').value;
    const locale = $('locale').value;
    if (categoryData && categoryData.region === region && categoryData.locale === locale) return categoryData;
    if (categoryMapPromise) return categoryMapPromise;

    try {
      const raw = localStorage.getItem('wow_category_map_v4');
      if (raw) {
        const cached = JSON.parse(raw);
        if (cached.region === region && cached.locale === locale && cached.fetched_at > Date.now() - 7 * 86400 * 1000) {
          categoryData = cached;
          return categoryData;
        }
      }
    } catch {}

    categoryMapPromise = (async () => {
      const params = new URLSearchParams({ action: 'category-map', region, locale });
      const res = await fetch(`${API_URL}?${params}`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      const data = await res.json();
      categoryData = {
        region, locale, fetched_at: Date.now(),
        root_ids: data.root_ids || [],
        categories: data.categories || {},
      };
      try {
        localStorage.setItem('wow_category_map_v4', JSON.stringify(categoryData));
      } catch {}
      return categoryData;
    })();

    try { return await categoryMapPromise; }
    finally { categoryMapPromise = null; }
  }

  function showStatus(msg, type) {
    statusEl.innerHTML = `<div class="status ${type}">${escapeHtml(msg)}</div>`;
  }
  function clearStatus() { statusEl.innerHTML = ''; }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString(t().dateLocale, { year: 'numeric', month: 'short', day: 'numeric' });
  }
</script>
</body>
</html>
