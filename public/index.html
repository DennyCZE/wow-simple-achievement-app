<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoW Simple Achievement App</title>
<style>
  :root {
    --bg: #1a1a1a;
    --panel: #242424;
    --panel-2: #2e2e2e;
    --border: #3a3a3a;
    --text: #e8e8e8;
    --muted: #888;
    --accent: #f0c419;
    --accent-hover: #d4a90f;
    --success: #4ade80;
    --error: #ef4444;
    --link: #60a5fa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.5;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { margin: 0 0 4px 0; font-size: 1.6rem; color: var(--accent); }
  .subtitle {
    color: var(--muted);
    margin-bottom: 24px;
    font-size: 0.9rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .cache-badge {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
  }
  .cache-badge.hit  { color: var(--success); border-color: var(--success); }
  .cache-badge.miss { color: var(--link);    border-color: var(--link); }

  .form-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (min-width: 600px) { .form-row-3 { grid-template-columns: 1fr 1fr 1fr; } }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; }
  input, select {
    width: 100%;
    padding: 8px 10px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%;
    padding: 10px 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status { padding: 12px; border-radius: 4px; margin: 12px 0; font-size: 0.95rem; }
  .status.error { background: #3a1414; border: 1px solid var(--error); color: #fca5a5; }
  .status.loading { background: #1e2a3a; border: 1px solid var(--link); color: #93c5fd; }
  .status.empty { background: var(--panel-2); border: 1px solid var(--border); color: var(--muted); text-align: center; padding: 32px; }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  @media (min-width: 600px) { .stats { grid-template-columns: repeat(4, 1fr); } }
  .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
  .stat-value { font-size: 1.6rem; font-weight: 600; color: var(--accent); line-height: 1.1; }
  .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

  .section-title { font-size: 0.95rem; color: var(--accent); margin: 0 0 8px 0; font-weight: 600; }
  .cat-section { margin-bottom: 20px; }
  summary.section-title { cursor: pointer; user-select: none; list-style: none; padding: 4px 0; }
  summary.section-title::-webkit-details-marker { display: none; }
  summary.section-title::before {
    content: '▼';
    display: inline-block;
    margin-right: 6px;
    font-size: 0.7em;
    transition: transform 0.15s;
  }
  .cat-section:not([open]) > summary.section-title::before { transform: rotate(-90deg); }
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }
  .cat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .cat-card:hover { border-color: var(--accent); }
  .cat-card.active { border-color: var(--accent); background: var(--panel-2); }
  .cat-card.loading { opacity: 0.6; cursor: progress; }
  .cat-name { font-size: 0.9rem; color: var(--text); margin-bottom: 4px; font-weight: 500; }
  .cat-stats { font-size: 0.8rem; color: var(--muted); }
  .cat-stats strong { color: var(--accent); font-weight: 600; }

  .filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .filters input[type="search"] { flex: 1; min-width: 200px; }
  .filter-btn {
    padding: 6px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
    width: auto;
    margin-top: 0;
    font-weight: normal;
  }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .ach-list { display: flex; flex-direction: column; gap: 6px; }
  .ach-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .ach-item.completed { border-left: 3px solid var(--success); }
  .ach-item.incomplete { border-left: 3px solid var(--muted); opacity: 0.85; }
  .ach-name { font-weight: 500; color: var(--text); text-decoration: none; }
  .ach-name:hover { color: var(--accent); }
  .ach-id { font-size: 0.75rem; color: var(--muted); margin-left: 8px; }
  .ach-date { font-size: 0.8rem; color: var(--muted); white-space: nowrap; }
</style>
<script>window.whTooltips = { colorLinks: true, iconizeLinks: true, renameLinks: false };</script>
<script async src="https://www.wowhead.com/widgets/power.js"></script>
</head>
<body>
<div class="container">
  <h1>⚔️ WoW Simple Achievement App</h1>
  <div class="subtitle">
    <span>Vyhledávač achievementů postavy přes Battle.net API</span>
    <span id="cacheBadge"></span>
  </div>

  <div class="form-card">
    <div class="form-row">
      <div>
        <label for="character">Jméno postavy</label>
        <input type="text" id="character" placeholder="např. Denisek" autocomplete="off">
      </div>
      <div>
        <label for="realm">Realm / Server</label>
        <input type="text" id="realm" placeholder="např. Argent Dawn" autocomplete="off" list="realm-history">
        <datalist id="realm-history"></datalist>
      </div>
    </div>
    <div class="form-row-3">
      <div>
        <label for="region">Region</label>
        <select id="region">
          <option value="eu" selected>Evropa (EU)</option>
          <option value="us">Amerika (US)</option>
          <option value="kr">Korea (KR)</option>
          <option value="tw">Taiwan (TW)</option>
        </select>
      </div>
      <div>
        <label for="locale">Jazyk</label>
        <select id="locale">
          <option value="cs_CZ" selected>Čeština</option>
          <option value="en_GB">English (EU)</option>
          <option value="en_US">English (US)</option>
          <option value="de_DE">Deutsch</option>
          <option value="pl_PL">Polski</option>
          <option value="ru_RU">Русский</option>
        </select>
      </div>
    </div>
    <button id="searchBtn">Načíst achievementy</button>
  </div>

  <div id="status"></div>
  <div id="results"></div>
</div>

<script>
  const API_URL = 'api.php';

  let allAchievements = [];
  let currentFilter = 'all';
  let searchTerm = '';
  let activeCategoryId = null;
  let categoryMap = null;
  let categoryMapPromise = null;

  const $ = id => document.getElementById(id);
  const statusEl  = $('status');
  const resultsEl = $('results');
  const searchBtn = $('searchBtn');
  const cacheBadge = $('cacheBadge');

  ['character', 'realm', 'region', 'locale'].forEach(id => {
    const saved = localStorage.getItem('wow_' + id);
    if (saved) $(id).value = saved;
    $(id).addEventListener('change', () => localStorage.setItem('wow_' + id, $(id).value));
  });

  // Realm autocomplete from per-region search history
  const REALM_HISTORY_KEY = 'wow_realm_history';
  const REALM_HISTORY_MAX = 10;

  function getRealmHistory() {
    try { return JSON.parse(localStorage.getItem(REALM_HISTORY_KEY) || '[]'); }
    catch { return []; }
  }
  function pushRealmHistory(realm, region) {
    const hist = getRealmHistory().filter(h => !(h.realm === realm && h.region === region));
    hist.unshift({ realm, region });
    localStorage.setItem(REALM_HISTORY_KEY, JSON.stringify(hist.slice(0, REALM_HISTORY_MAX)));
  }
  function renderRealmDatalist() {
    const region = $('region').value;
    $('realm-history').innerHTML = getRealmHistory()
      .filter(h => h.region === region)
      .map(h => `<option value="${escapeHtml(h.realm)}">`)
      .join('');
  }
  $('region').addEventListener('change', () => {
    renderRealmDatalist();
    activeCategoryId = null;
    categoryMap = null;
  });
  renderRealmDatalist();

  searchBtn.addEventListener('click', loadAchievements);
  $('character').addEventListener('keydown', e => { if (e.key === 'Enter') loadAchievements(); });
  $('realm').addEventListener('keydown', e => { if (e.key === 'Enter') loadAchievements(); });

  async function loadAchievements() {
    const character = $('character').value.trim();
    const realm     = $('realm').value.trim();
    const region    = $('region').value;
    const locale    = $('locale').value;

    if (!character || !realm) {
      showStatus('Vyplň prosím jméno postavy i realm.', 'error');
      return;
    }

    localStorage.setItem('wow_character', character);
    localStorage.setItem('wow_realm', realm);

    searchBtn.disabled = true;
    searchBtn.textContent = 'Načítám...';
    showStatus('Načítám data z Battle.net API...', 'loading');
    resultsEl.innerHTML = '';
    cacheBadge.textContent = '';
    cacheBadge.className = 'cache-badge';

    try {
      const params = new URLSearchParams({ character, realm, region, locale });
      const res = await fetch(`${API_URL}?${params}`);
      const data = await res.json();

      const cacheStatus = res.headers.get('X-Cache');
      if (cacheStatus) {
        cacheBadge.textContent = cacheStatus === 'HIT' ? 'cache: hit' : 'cache: live';
        cacheBadge.className = 'cache-badge ' + cacheStatus.toLowerCase();
      }

      if (!res.ok) {
        const errMsg = data.error || `Chyba ${res.status}`;
        let userMsg = errMsg;
        if (res.status === 404) {
          userMsg = `Postava "${character}" na realmu "${realm}" nebyla nalezena. Zkontroluj jméno a server.`;
        }
        showStatus(userMsg, 'error');
        return;
      }

      renderResults(data);
      pushRealmHistory(realm, region);
      renderRealmDatalist();
      clearStatus();
    } catch (err) {
      showStatus('Chyba spojení: ' + err.message, 'error');
    } finally {
      searchBtn.disabled = false;
      searchBtn.textContent = 'Načíst achievementy';
    }
  }

  function renderResults(data) {
    allAchievements = (data.achievements || []).map(a => ({
      id: a.id,
      name: a.achievement?.name || `Achievement #${a.id}`,
      completedAt: a.completed_timestamp || null,
    }));

    const totalCompleted = allAchievements.filter(a => a.completedAt).length;
    const totalKnown     = allAchievements.length;
    const totalPoints    = data.total_points ?? 0;
    const totalQuantity  = data.total_quantity ?? totalCompleted;

    const categoryProgress = (data.category_progress || [])
      .slice()
      .sort((a, b) => (b.quantity || 0) - (a.quantity || 0));

    const categoryHtml = categoryProgress.length ? `
      <details open class="cat-section">
        <summary class="section-title">Kategorie</summary>
        <div class="cat-grid">
          ${categoryProgress.map(c => `
            <div class="cat-card${activeCategoryId === c.category?.id ? ' active' : ''}" data-cat-id="${c.category?.id ?? ''}" role="button" tabindex="0">
              <div class="cat-name">${escapeHtml(c.category?.name || '—')}</div>
              <div class="cat-stats"><strong>${c.quantity ?? 0}</strong> splněno · <strong>${c.points ?? 0}</strong> bodů</div>
            </div>
          `).join('')}
        </div>
      </details>
    ` : '';

    resultsEl.innerHTML = `
      <div class="stats">
        <div class="stat-card">
          <div class="stat-value">${totalQuantity}</div>
          <div class="stat-label">Splněno celkem</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${totalPoints}</div>
          <div class="stat-label">Bodů</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${totalKnown}</div>
          <div class="stat-label">V seznamu</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${totalKnown - totalCompleted}</div>
          <div class="stat-label">Rozpracováno</div>
        </div>
      </div>

      ${categoryHtml}

      <div class="filters">
        <input type="search" id="searchInput" placeholder="Hledat achievement...">
        <button class="filter-btn active" data-filter="all">Vše</button>
        <button class="filter-btn" data-filter="completed">✓ Splněno</button>
        <button class="filter-btn" data-filter="incomplete">Rozpracováno</button>
      </div>

      <div id="achList" class="ach-list"></div>
    `;

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderList();
      });
    });
    $('searchInput').addEventListener('input', e => {
      searchTerm = e.target.value.toLowerCase();
      renderList();
    });

    document.querySelectorAll('.cat-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = parseInt(card.dataset.catId, 10);
        if (Number.isFinite(id)) selectCategory(id);
      });
    });

    renderList();
  }

  async function ensureCategoryMap() {
    const region = $('region').value;
    const locale = $('locale').value;
    if (categoryMap && categoryMap.__region === region && categoryMap.__locale === locale) return categoryMap;
    if (categoryMapPromise) return categoryMapPromise;

    // localStorage cache (7 days, scoped per region+locale)
    try {
      const raw = localStorage.getItem('wow_category_map');
      if (raw) {
        const cached = JSON.parse(raw);
        if (cached.region === region && cached.locale === locale && cached.fetched_at > Date.now() - 7 * 86400 * 1000) {
          categoryMap = { ...cached.categories, __region: region, __locale: locale };
          return categoryMap;
        }
      }
    } catch {}

    categoryMapPromise = (async () => {
      const params = new URLSearchParams({ action: 'category-map', region, locale });
      const res = await fetch(`${API_URL}?${params}`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      const data = await res.json();
      try {
        localStorage.setItem('wow_category_map', JSON.stringify({
          region, locale, fetched_at: Date.now(), categories: data.categories,
        }));
      } catch {}
      categoryMap = { ...data.categories, __region: region, __locale: locale };
      return categoryMap;
    })();

    try { return await categoryMapPromise; }
    finally { categoryMapPromise = null; }
  }

  async function selectCategory(categoryId) {
    // Toggle off if already active
    if (activeCategoryId === categoryId) {
      activeCategoryId = null;
      document.querySelectorAll('.cat-card.active').forEach(c => c.classList.remove('active'));
      renderList();
      return;
    }

    const cardEl = document.querySelector(`.cat-card[data-cat-id="${categoryId}"]`);
    const isFirstLoad = !categoryMap;
    if (isFirstLoad) showStatus('Načítám mapu kategorií (první načtení může trvat až minutu)...', 'loading');
    if (cardEl) cardEl.classList.add('loading');

    try {
      await ensureCategoryMap();
      activeCategoryId = categoryId;
      document.querySelectorAll('.cat-card.active').forEach(c => c.classList.remove('active'));
      if (cardEl) cardEl.classList.add('active');
      renderList();
      if (isFirstLoad) clearStatus();
    } catch (err) {
      showStatus('Nepodařilo se načíst kategorie: ' + err.message, 'error');
    } finally {
      if (cardEl) cardEl.classList.remove('loading');
    }
  }

  function renderList() {
    const list = $('achList');
    if (!list) return;

    let items = allAchievements;
    if (currentFilter === 'completed') items = items.filter(a => a.completedAt);
    else if (currentFilter === 'incomplete') items = items.filter(a => !a.completedAt);

    if (activeCategoryId !== null && categoryMap) {
      const catData = categoryMap[String(activeCategoryId)];
      if (catData) {
        const allowed = new Set(catData.achievement_ids);
        items = items.filter(a => allowed.has(a.id));
      }
    }

    if (searchTerm) {
      items = items.filter(a => a.name.toLowerCase().includes(searchTerm));
    }

    items.sort((a, b) => {
      if (a.completedAt && b.completedAt) return b.completedAt - a.completedAt;
      if (a.completedAt) return -1;
      if (b.completedAt) return 1;
      return a.name.localeCompare(b.name, 'cs');
    });

    if (items.length === 0) {
      list.innerHTML = '<div class="status empty">Žádné výsledky odpovídající filtru.</div>';
      return;
    }

    list.innerHTML = items.map(a => `
      <div class="ach-item ${a.completedAt ? 'completed' : 'incomplete'}">
        <div>
          <a class="ach-name" href="https://www.wowhead.com/achievement=${a.id}" target="_blank" rel="noopener noreferrer">${escapeHtml(a.name)}</a>
          <span class="ach-id">#${a.id}</span>
        </div>
        <div class="ach-date">
          ${a.completedAt ? formatDate(a.completedAt) : '—'}
        </div>
      </div>
    `).join('');

    if (window.$WowheadPower) window.$WowheadPower.refreshLinks();
  }

  function showStatus(msg, type) {
    statusEl.innerHTML = `<div class="status ${type}">${escapeHtml(msg)}</div>`;
  }
  function clearStatus() { statusEl.innerHTML = ''; }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('cs-CZ', { year: 'numeric', month: 'short', day: 'numeric' });
  }
</script>
</body>
</html>
