# Add this inside your existing site's server { } block.
#
# Place it BEFORE any general "location /" block, since nginx matches
# specific prefixes first regardless of order — but conventionally
# put more specific blocks first for readability.
#
# Replace 8089 if you set a different HOST_PORT in .env

location /wow-achievements/ {
    # Trailing slash on proxy_pass strips the /wow-achievements/ prefix
    # before forwarding — so the container sees requests at root
    proxy_pass http://127.0.0.1:8089/;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts (Blizzard API can occasionally be slow)
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
}

# Redirect /wow-achievements (no trailing slash) to /wow-achievements/
# so relative links in HTML resolve correctly
location = /wow-achievements {
    return 301 /wow-achievements/;
}
